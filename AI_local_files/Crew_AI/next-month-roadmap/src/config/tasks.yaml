marketing_analysis_task:
  description: >
    Analyze the startup's marketing and growth metrics with the following data:
    
    Marketing Channels: {marketing_channels}
    Monthly Users: {monthly_users}
    Customer Acquisition Cost: {cac}
    Retention Strategy: {retention_strategy}
    Growth Problems: {growth_problems}
    
    Based on this data, create a NEXT MONTH ROADMAP with week-by-week action plan for 30 days.
    
    You must respond ONLY with valid JSON in this exact format (no markdown, no extra text):
    {{
      "agent_name": "Marketing Advisor",
      "next_month_roadmap": [
        "Week 1: [Specific marketing action items for week 1]",
        "Week 2: [Specific marketing action items for week 2]",
        "Week 3: [Specific marketing action items for week 3]",
        "Week 4: [Specific marketing action items for week 4]"
      ]
    }}
    
  expected_output: >
    Valid JSON with agent_name and 4-item next_month_roadmap array
  agent: marketing_advisor

